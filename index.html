<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Portfolio</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+Myanmar:wght@300;400;700&family=DM+Serif+Display:ital@0;1&display=swap"
            rel="stylesheet">
        <style>
            :root {
                --ink: #1a1a2e;
                --ink2: #4a4a6a;
                --ink3: #8888aa;
                --gold: #c9a84c;
                --gold2: #e8c97a;
                --cream: #faf8f3;
                --white: #ffffff;
                --line: rgba(0,0,0,0.08);
                --r: 14px;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Noto Sans JP', 'Noto Sans Myanmar', serif;
                background: var(--cream);
                color: var(--ink);
                min-height: 100vh;
            }

            /* ── LANG BAR ── */
            .lang-bar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 200;
                display: flex;
                justify-content: flex-end;
                gap: 4px;
                padding: 12px 24px;
                background: rgba(250,248,243,0.92);
                backdrop-filter: blur(8px);
                border-bottom: 1px solid var(--line);
            }
            .lb {
                padding: 4px 14px;
                border-radius: 20px;
                border: 1px solid rgba(0,0,0,0.15);
                background: transparent;
                color: var(--ink2);
                font-size: 0.78rem;
                cursor: pointer;
                font-family: inherit;
                transition: all 0.18s;
                letter-spacing: 0.03em;
            }
            .lb:hover {
                border-color: var(--gold);
                color: var(--gold);
            }
            .lb.on {
                background: var(--ink);
                color: var(--cream);
                border-color: var(--ink);
            }

            /* ── HERO ── */
            .hero {
                padding: 100px 24px 60px;
                max-width: 720px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 20px;
            }

            .avatar-wrap {
                position: relative;
                width: 120px;
                height: 120px;
            }
            .avatar-ring {
                position: absolute;
                inset: -4px;
                border-radius: 50%;
                background: conic-gradient(var(--gold), var(--gold2), var(--gold));
                opacity: 0.6;
            }
            .avatar {
                position: relative;
                width: 120px;
                height: 120px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid var(--cream);
                background: linear-gradient(135deg, #e8e0d0 0%, #d4c9b0 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2.8rem;
                overflow: hidden;
            }
            .avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 50%;
            }
            .avatar-emoji {
                font-size: 2.8rem;
                line-height: 1;
            }

            .hero-name {
                font-family: 'DM Serif Display', serif;
                font-size: clamp(2rem, 5vw, 2.8rem);
                color: var(--ink);
                line-height: 1.2;
            }
            .hero-title {
                font-size: 0.9rem;
                color: var(--gold);
                letter-spacing: 0.12em;
                text-transform: uppercase;
                font-weight: 500;
            }
            .hero-location {
                font-size: 0.85rem;
                color: var(--ink3);
            }
            .hero-bio {
                font-size: 0.95rem;
                color: var(--ink2);
                line-height: 1.9;
                max-width: 520px;
            }

            /* ── DIVIDER ── */
            .ornament {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 40px auto;
                max-width: 720px;
                padding: 0 24px;
            }
            .ornament-line {
                flex: 1;
                height: 1px;
                background: var(--line);
            }
            .ornament-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--gold);
                opacity: 0.6;
            }

            /* ── SECTION ── */
            .section {
                max-width: 720px;
                margin: 0 auto;
                padding: 0 24px 56px;
            }
            .sec-label {
                font-size: 0.72rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--gold);
                font-weight: 700;
                margin-bottom: 24px;
            }

            /* ── EXPERIENCE ── */
            .exp-list {
                display: flex;
                flex-direction: column;
                gap: 0;
            }
            .exp-item {
                display: grid;
                grid-template-columns: 80px 1fr;
                gap: 0 20px;
                position: relative;
            }
            .exp-item:not(:last-child)::after {
                content: '';
                position: absolute;
                left: 80px;
                top: 28px;
                bottom: -1px;
                width: 1px;
                background: var(--line);
                margin-left: -10px;
            }
            .exp-year {
                font-size: 0.78rem;
                color: var(--ink3);
                padding-top: 3px;
                text-align: right;
                white-space: nowrap;
            }
            .exp-body {
                padding-bottom: 32px;
                padding-left: 20px;
                border-left: none;
                position: relative;
            }
            .exp-body::before {
                content: '';
                position: absolute;
                left: -1px;
                top: 8px;
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--gold);
                transform: translateX(-50%);
                border: 2px solid var(--cream);
                outline: 1px solid var(--gold);
            }
            .exp-company {
                font-size: 0.8rem;
                color: var(--gold);
                font-weight: 500;
                margin-bottom: 2px;
                letter-spacing: 0.04em;
            }
            .exp-role {
                font-size: 1rem;
                font-weight: 500;
                color: var(--ink);
                margin-bottom: 6px;
            }
            .exp-desc {
                font-size: 0.85rem;
                color: var(--ink2);
                line-height: 1.8;
            }

            /* ── CERTS ── */
            .cert-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 14px;
            }
            .cert-card {
                background: var(--white);
                border: 1px solid var(--line);
                border-radius: var(--r);
                padding: 18px 16px;
                transition: transform 0.18s, box-shadow 0.18s;
                position: relative;
                overflow: hidden;
            }
            .cert-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: linear-gradient(90deg, var(--gold), var(--gold2));
            }
            .cert-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 28px rgba(0,0,0,0.07);
            }
            .cert-icon {
                font-size: 1.6rem;
                margin-bottom: 10px;
            }
            .cert-name {
                font-size: 0.9rem;
                font-weight: 500;
                color: var(--ink);
                margin-bottom: 4px;
                line-height: 1.4;
            }
            .cert-issuer {
                font-size: 0.76rem;
                color: var(--ink3);
            }
            .cert-year {
                font-size: 0.72rem;
                color: var(--gold);
                font-weight: 600;
                margin-top: 8px;
            }

            /* ── FOOTER CONTACT ── */
            .footer {
                background: var(--ink);
                color: rgba(255,255,255,0.6);
                padding: 40px 24px;
                text-align: center;
            }
            .footer-name {
                font-family: 'DM Serif Display', serif;
                color: var(--gold2);
                font-size: 1.2rem;
                margin-bottom: 12px;
            }
            .footer-links {
                display: flex;
                gap: 20px;
                justify-content: center;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }
            .footer-links a {
                color: rgba(255,255,255,0.6);
                text-decoration: none;
                font-size: 0.83rem;
                transition: color 0.18s;
            }
            .footer-links a:hover {
                color: var(--gold2);
            }
            .footer-copy {
                font-size: 0.75rem;
            }

            @media (max-width: 500px) {
                .exp-item {
                    grid-template-columns: 60px 1fr;
                }
            }
        </style>
    </head>
    <body>

        <!-- LANG BAR -->

        <!-- WORK EXPERIENCE -->

        </section>

        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-dot"></div>
            <div class="ornament-line"></div>
        </div>

        <!-- CERTIFICATES -->
        <section class="section">
            <p class="sec-label" data-i18n="cert_label"></p>
            <div class="cert-grid" id="cert-grid"></div>
        </section>

        <!-- FOOTER -->

            <div class="footer-links">

    /* ═══════════════════════════════════════════════════
     ⚙️  Logic — ပြင်ဆင်မည် မဟုတ်ပါ
     ═══════════════════════════════════════════════════ */

            let currentLang = 'ja'

            function setLang(lang, btn) {
                currentLang = lang
                document
                    .querySelectorAll('.lb')
                    .forEach(b => b.classList.remove('on'))
                if (btn) 
                    btn
                        .classList
                        .add('on')
                renderText()
                renderExp()
                renderCerts()
            }

            function renderText() {
                const t = data.text[currentLang]
                document
                    .querySelectorAll('[data-i18n]')
                    .forEach(el => {
                        const key = el.getAttribute('data-i18n')
                        if (t[key]) 
                            el.textContent = t[key]
                    })
                document.documentElement.lang = currentLang
            }

            function renderExp() {
                const list = document.getElementById('exp-list')
                list.innerHTML = data
                    .experience
                    .map(
                        e => `
      <div class="exp-item">
        <div class="exp-year">${e.year}</div>
        <div class="exp-body">
          <div class="exp-company">${e[currentLang].company}</div>
          <div class="exp-role">${e[currentLang].role}</div>
          <div class="exp-desc">${e[currentLang].desc}</div>
        </div>
      </div>
    `
                    )
                    .join('')
            }

            function renderCerts() {
                const grid = document.getElementById('cert-grid')
                grid.innerHTML = data
                    .certificates
                    .map(
                        c => `
      <div class="cert-card">
        <div class="cert-icon">${c.icon}</div>
        <div class="cert-name">${c[currentLang].name}</div>
        <div class="cert-issuer">${c[currentLang].issuer}</div>
        <div class="cert-year">${c.year}</div>
      </div>
    `
                    )
                    .join('')
            }

            setLang('ja', document.querySelector('.lb.on'))
        </script>
    </body>
</html>
